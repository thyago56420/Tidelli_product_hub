<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tidelli Product Hub & Finishes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: oklch(97.5% 0.008 60);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: oklch(80% 0.015 60); border-radius: 3px; }
    select { appearance: auto; }
    table { border-collapse: collapse; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    button:focus-visible { outline: 2px solid oklch(55% 0.10 45); outline-offset: 2px; }
  </style>
</head>
<body>
<div id="root"></div>

<!-- Firebase removed — app runs on Supabase + localStorage fallback -->

<!-- Supabase SDK + client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>

<!-- Data layer -->
<script src="data/tidelli-data.js"></script>
<script src="data/ropes-real.js"></script>
<script type="text/babel" src="data/mockData.js"></script>
<!-- Excel parser (SheetJS) -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<!-- Shared components -->
<script type="text/babel" src="components/TopBar.jsx"></script>
<script type="text/babel" src="components/Sidebar.jsx"></script>
<!-- Screens -->
<script type="text/babel" src="components/LoginScreen.jsx"></script>
<script type="text/babel" src="components/DashboardScreen.jsx"></script>
<script type="text/babel" src="components/CatalogScreen.jsx"></script>
<script type="text/babel" src="components/FinishLibraryScreen.jsx"></script>
<script type="text/babel" src="components/MaterialInventoryScreen.jsx"></script>
<script type="text/babel" src="components/StoreManagementScreen.jsx"></script>
<script type="text/babel" src="components/StoreInventoryScreen.jsx"></script>
<script type="text/babel" src="components/InventoryBatchUpload.jsx"></script>
<!-- Image slots -->
<script src="image-slot.js"></script>
<!-- Tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Main App -->
<script type="text/babel">

// Bridge: expose MOCK_DATA into this Babel script scope
const MOCK_DATA = window.MOCK_DATA;
const STATUS_CONFIG = window.STATUS_CONFIG;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "oklch(42% 0.12 200)",
  "sidebarColor": "oklch(96% 0.008 60)",
  "cardRadius": 4,
  "fontScale": 1,
  "showProductImages": true,
  "defaultLang": "en"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Clear stale product data on load (new Excel source)
  React.useEffect(() => {
    try {
      localStorage.removeItem('customProducts');
      localStorage.removeItem('deletedProductIds');
      localStorage.removeItem('productEditOverrides');
      localStorage.removeItem('productStatusOverrides');
      localStorage.removeItem('productFinishOverrides');
    } catch (e) {}
  }, []);

  const [lang, setLang] = React.useState(TWEAK_DEFAULTS.defaultLang || 'en');
  const [loggedIn, setLoggedIn] = React.useState(false);
  const [authChecked, setAuthChecked] = React.useState(false);
  const [dataLoaded, setDataLoaded] = React.useState(false);
  const [currentUser, setCurrentUser] = React.useState(null);
  const [currentRole, setCurrentRole] = React.useState('super_admin');
  const [currentScreen, setCurrentScreen] = React.useState('dashboard');
  const [prevScreen, setPrevScreen] = React.useState(null);

  // ── Load Excel product data ───────────────────────────────────────
  React.useEffect(() => {
    if (window.LOAD_EXCEL_PRODUCTS) {
      window.LOAD_EXCEL_PRODUCTS().then(() => setDataLoaded(true));
    } else {
      setDataLoaded(true);
    }
  }, []);

  // ── Supabase connection status ───────────────────────────────────
  const [fbStatus, setFbStatus] = React.useState(window.SB_ENABLED ? 'connected' : 'offline');

  // ── Supabase auth: restore session + listen for changes ──────────
  const resolveProfile = React.useCallback(async (authUser) => {
    // 1) profiles table  2) MOCK_DATA by email  3) sensible default
    let profile = await (window.SB ? window.SB.loadProfile(authUser.id) : null);
    if (!profile) {
      const byEmail = MOCK_DATA.users.find(
        (u) => u.email.toLowerCase() === (authUser.email || '').toLowerCase()
      );
      profile = byEmail || {
        id: authUser.id,
        name: authUser.email,
        email: authUser.email,
        role: 'store_user',
        store: 'Unknown',
        avatar: (authUser.email || 'U')[0].toUpperCase(),
      };
    }
    return profile;
  }, []);

  React.useEffect(() => {
    if (!window.SB_ENABLED) { setAuthChecked(true); return; }
    let active = true;

    // Restore an existing session on load
    window.SB.getSession().then(async (session) => {
      if (!active) return;
      if (session && session.user) {
        const profile = await resolveProfile(session.user);
        if (!active) return;
        setCurrentUser(profile);
        setCurrentRole(profile.role || 'store_user');
        setLoggedIn(true);
      }
      setAuthChecked(true);
    });

    // React to sign-in / token refresh. We only LOG IN on a present session;
    // sign-out is handled by handleLogout so demo logins aren't clobbered.
    const { data: sub } = window.SB.onAuthChange(async (session, event) => {
      if (session && session.user && (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED')) {
        const profile = await resolveProfile(session.user);
        if (!active) return;
        setCurrentUser(profile);
        setCurrentRole(profile.role || 'store_user');
        setLoggedIn(true);
      }
    });

    return () => { active = false; sub && sub.subscription && sub.subscription.unsubscribe(); };
  }, [resolveProfile]);

  // ── Supabase realtime: store inventory lists ────────────────────
  React.useEffect(() => {
    if (!window.SB_ENABLED) return;
    let active = true;
    const refresh = async () => {
      const lists = await window.SB.listsGetAll();
      if (active && lists) {
        setInventories(lists);
        try { localStorage.setItem('storeInventories', JSON.stringify(lists)); } catch {}
      }
    };
    refresh();
    const unsub = window.SB.subscribeLists(refresh);
    return () => { active = false; unsub && unsub(); };
  }, []);

  // ── Compute merged finishes from base + persisted overrides ──────
  const computeFinishes = React.useCallback(() => {
    const base = MOCK_DATA.finishes.map(f => ({ ...f }));
    let overrides = {}, custom = [], deleted = [];
    try { overrides = JSON.parse(localStorage.getItem('finishOverrides') || '{}'); } catch {}
    try { custom = JSON.parse(localStorage.getItem('customFinishes') || '[]'); } catch {}
    try { deleted = JSON.parse(localStorage.getItem('deletedFinishIds') || '[]'); } catch {}
    const deletedSet = new Set(deleted);
    const merged = base
      .filter(f => !deletedSet.has(f.id))
      .map(f => overrides[f.id] ? { ...f, ...overrides[f.id] } : f);
    const customKept = custom.filter(f => !deletedSet.has(f.id));
    return [...merged, ...customKept];
  }, []);

  // Finishes — the single source of truth for qty/stock across all screens
  const [finishes, setFinishes] = React.useState(computeFinishes);

  // ── Rehydrate finish data from Supabase kv_store on load ─────────
  React.useEffect(() => {
    if (!window.SB_ENABLED) return;
    let active = true;
    (async () => {
      const kv = await window.SB.kvGetAll();
      if (!active || !kv) return;
      const keys = ['finishOverrides', 'customFinishes', 'deletedFinishIds'];
      let touched = false;
      window.SB._restoring = true; // don't echo these writes back to the cloud
      keys.forEach((k) => {
        if (kv[k] !== undefined) {
          try { localStorage.setItem(k, JSON.stringify(kv[k])); touched = true; } catch {}
        }
      });
      window.SB._restoring = false;
      if (touched) {
        const next = computeFinishes();
        MOCK_DATA.finishes = next;
        setFinishes(next);
      }
    })();
    return () => { active = false; };
  }, [computeFinishes]);

  // Called by MaterialInventoryScreen on save — updates state, persists, and syncs MOCK_DATA
  const handleUpdateFinish = React.useCallback((id, updates) => {
    setFinishes(prev => {
      const next = prev.map(f => f.id === id ? { ...f, ...updates } : f);
      MOCK_DATA.finishes = next;
      // Persist overrides for base finishes
      try {
        const overrides = JSON.parse(localStorage.getItem('finishOverrides') || '{}');
        overrides[id] = { ...(overrides[id] || {}), ...updates };
        localStorage.setItem('finishOverrides', JSON.stringify(overrides));
      } catch {}
      // If this is a custom finish, also update its persisted record
      try {
        const custom = JSON.parse(localStorage.getItem('customFinishes') || '[]');
        const cIdx = custom.findIndex(f => f.id === id);
        if (cIdx >= 0) {
          custom[cIdx] = { ...custom[cIdx], ...updates };
          localStorage.setItem('customFinishes', JSON.stringify(custom));
        }
      } catch {}
      return next;
    });
  }, []);

  // Called by MaterialInventoryScreen on import — adds a brand-new finish
  const handleAddFinish = React.useCallback((finish) => {
    setFinishes(prev => {
      const next = [...prev, finish];
      MOCK_DATA.finishes = next;
      try {
        const custom = JSON.parse(localStorage.getItem('customFinishes') || '[]');
        custom.push(finish);
        localStorage.setItem('customFinishes', JSON.stringify(custom));
      } catch {}
      return next;
    });
  }, []);

  // Called by MaterialInventoryScreen on delete
  const handleDeleteFinish = React.useCallback((id) => {
    setFinishes(prev => {
      const next = prev.filter(f => f.id !== id);
      MOCK_DATA.finishes = next;
      // Track in deletedFinishIds for base finishes; remove from customFinishes if applicable
      try {
        const deleted = JSON.parse(localStorage.getItem('deletedFinishIds') || '[]');
        if (!deleted.includes(id)) {
          deleted.push(id);
          localStorage.setItem('deletedFinishIds', JSON.stringify(deleted));
        }
      } catch {}
      try {
        const custom = JSON.parse(localStorage.getItem('customFinishes') || '[]');
        const filtered = custom.filter(f => f.id !== id);
        if (filtered.length !== custom.length) {
          localStorage.setItem('customFinishes', JSON.stringify(filtered));
        }
      } catch {}
      // Also clean up any override entry
      try {
        const overrides = JSON.parse(localStorage.getItem('finishOverrides') || '{}');
        if (overrides[id]) {
          delete overrides[id];
          localStorage.setItem('finishOverrides', JSON.stringify(overrides));
        }
      } catch {}
      return next;
    });
  }, []);

  // Persisted product finish-type overrides: { [productId]: { [type]: true|false } }
  const [productFinishOverrides, setProductFinishOverrides] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('productFinishOverrides') || '{}'); } catch { return {}; }
  });

  // Persisted product status overrides: { [productId]: statusString }
  const [productStatusOverrides, setProductStatusOverrides] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('productStatusOverrides') || '{}'); } catch { return {}; }
  });

  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('sidebarCollapsed') || 'false'); } catch { return false; }
  });
  const toggleSidebar = () => setSidebarCollapsed(prev => {
    const next = !prev;
    localStorage.setItem('sidebarCollapsed', JSON.stringify(next));
    return next;
  });

  // Persisted store inventory lists
  const [inventories, setInventories] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('storeInventories') || '[]'); } catch { return []; }
  });

  const handleSaveInventoryList = React.useCallback((list) => {
    if (window.SB_ENABLED) {
      window.SB.listUpsert(list); // realtime subscription will confirm
    }
    // Optimistic local update
    setInventories(prev => {
      const idx = prev.findIndex(l => l.id === list.id);
      const next = idx >= 0 ? prev.map(l => l.id === list.id ? list : l) : [...prev, list];
      try { localStorage.setItem('storeInventories', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  const handleDeleteInventoryList = React.useCallback((id) => {
    if (window.SB_ENABLED) {
      window.SB.listDelete(id);
    }
    setInventories(prev => {
      const next = prev.filter(l => l.id !== id);
      try { localStorage.setItem('storeInventories', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  // Persisted custom products added by admins: Product[]
  const [customProducts, setCustomProducts] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('customProducts') || '[]'); } catch { return []; }
  });

  // Override a product's status (e.g. restore from discontinued)
  const handleStatusOverride = React.useCallback((productId, newStatus) => {
    setProductStatusOverrides(prev => {
      const next = { ...prev, [productId]: newStatus };
      localStorage.setItem('productStatusOverrides', JSON.stringify(next));
      return next;
    });
  }, []);

  // Add a new custom product
  const handleAddProduct = React.useCallback((product) => {
    setCustomProducts(prev => {
      const next = [...prev, product];
      try { localStorage.setItem('customProducts', JSON.stringify(next)); } catch (e) { console.warn('localStorage quota exceeded, product added in-memory only'); }
      return next;
    });
  }, []);

  // Edit an existing product (updates MOCK_DATA in-place + persists overrides)
  const [productEditOverrides, setProductEditOverrides] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('productEditOverrides') || '{}'); } catch { return {}; }
  });
  const handleEditProduct = React.useCallback((productId, updates) => {
    setProductEditOverrides(prev => {
      const next = { ...prev, [productId]: { ...(prev[productId] || {}), ...updates } };
      localStorage.setItem('productEditOverrides', JSON.stringify(next));
      return next;
    });
  }, []);

  // Deleted product IDs (hides them from catalog)
  const [deletedProductIds, setDeletedProductIds] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('deletedProductIds') || '[]'); } catch { return []; }
  });

  const handleDeleteProducts = React.useCallback((ids) => {
    setDeletedProductIds(prev => {
      const next = [...new Set([...prev, ...ids])];
      localStorage.setItem('deletedProductIds', JSON.stringify(next));
      return next;
    });
    // Also remove from customProducts if any
    setCustomProducts(prev => {
      const idSet = new Set(ids);
      const next = prev.filter(p => !idSet.has(p.id));
      localStorage.setItem('customProducts', JSON.stringify(next));
      return next;
    });
  }, []);

  const handleDeleteAllProducts = React.useCallback(() => {
    // Mark all current MOCK_DATA products as deleted + clear custom products
    const allIds = MOCK_DATA.products.map(p => p.id);
    setDeletedProductIds(prev => {
      const next = [...new Set([...prev, ...allIds])];
      localStorage.setItem('deletedProductIds', JSON.stringify(next));
      return next;
    });
    setCustomProducts([]);
    localStorage.setItem('customProducts', '[]');
  }, []);

  // Called by MaterialInventoryScreen on save — updates state AND keeps MOCK_DATA in sync
  const t = MOCK_DATA.translations[lang];

  const handleLogin = (user) => {
    setCurrentUser(user);
    setCurrentRole(user.role);
    setLoggedIn(true);
    setCurrentScreen('dashboard');
  };

  const handleLogout = () => {
    if (window.SB_ENABLED) window.SB.signOut();
    setLoggedIn(false);
    setCurrentUser(null);
    setCurrentScreen('dashboard');
  };

  const handleNavigate = (screen) => {
    setPrevScreen(currentScreen);
    setCurrentScreen(screen);
  };

  const handleLangToggle = () => {
    setLang(prev => prev === 'en' ? 'pt' : 'en');
  };

  const handleRoleChange = (role) => {
    setCurrentRole(role);
    // Map role to user
    const user = MOCK_DATA.users.find(u => u.role === role) || MOCK_DATA.users[0];
    setCurrentUser(user);
    // If navigating to admin-only screen from non-admin role, redirect
    const adminOnly = ['materials', 'stores'];
    if (adminOnly.includes(currentScreen) && !['admin','super_admin'].includes(role)) {
      setCurrentScreen('dashboard');
    }
  };

  // Not logged in — show login (wait for auth check first)
  if (!authChecked || !dataLoaded) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: 'oklch(97.5% 0.008 60)', fontFamily: 'DM Sans, sans-serif', color: 'oklch(60% 0.03 55)', fontSize: 14 }}>
        {!dataLoaded ? 'Loading product catalog…' : 'Loading…'}
      </div>
    );
  }

  if (!loggedIn) {
    return <LoginScreen onLogin={handleLogin} lang={lang} onLangToggle={handleLangToggle} />;
  }

  const isAdmin = currentRole === 'admin' || currentRole === 'super_admin';

  const renderScreen = () => {
    switch (currentScreen) {
      case 'dashboard':
        return <DashboardScreen t={t} lang={lang} onNavigate={handleNavigate} currentRole={currentRole} />;
      case 'catalog':
        return <CatalogScreen
          t={t}
          lang={lang}
          onNavigate={handleNavigate}
          currentRole={currentRole}
          productFinishOverrides={productFinishOverrides}
          productStatusOverrides={productStatusOverrides}
          productEditOverrides={productEditOverrides}
          deletedProductIds={deletedProductIds}
          onStatusOverride={handleStatusOverride}
          onEditProduct={handleEditProduct}
          onDeleteProducts={handleDeleteProducts}
          onDeleteAllProducts={handleDeleteAllProducts}
          customProducts={customProducts}
          onAddProduct={handleAddProduct}
        />;
      case 'finishes':
        return <FinishLibraryScreen t={t} lang={lang} currentRole={currentRole} finishes={finishes} />;
      case 'materials':
        return isAdmin
          ? <MaterialInventoryScreen t={t} lang={lang} finishes={finishes} onUpdateFinish={handleUpdateFinish} onAddFinish={handleAddFinish} onDeleteFinish={handleDeleteFinish} />
          : <div style={{ padding: 60, textAlign: 'center', fontFamily: 'DM Sans, sans-serif', color: 'oklch(55% 0.03 55)' }}>Access restricted to Admin roles.</div>;
      case 'inventories':
        return <StoreInventoryScreen
          lang={lang}
          currentRole={currentRole}
          currentUser={currentUser || MOCK_DATA.users[0]}
          allProducts={[...MOCK_DATA.products, ...customProducts]}
          finishes={finishes}
          inventories={inventories}
          onSaveList={handleSaveInventoryList}
          onDeleteList={handleDeleteInventoryList}
        />;
      case 'stores':
        return isAdmin
          ? <StoreManagementScreen t={t} lang={lang} />
          : <div style={{ padding: 60, textAlign: 'center', fontFamily: 'DM Sans, sans-serif', color: 'oklch(55% 0.03 55)' }}>Access restricted to Admin roles.</div>;
      default:
        return <DashboardScreen t={t} lang={lang} onNavigate={handleNavigate} currentRole={currentRole} />;
    }
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      {/* Sidebar */}
      <Sidebar
        currentScreen={currentScreen}
        onNavigate={handleNavigate}
        currentRole={currentRole}
        lang={lang}
        t={t}
        sidebarColor={tweaks.sidebarColor}
        collapsed={sidebarCollapsed}
        onToggleCollapse={toggleSidebar}
        fbStatus={fbStatus}
      />

      {/* Main area */}
      <div style={{
        flex: 1,
        marginLeft: sidebarCollapsed ? 60 : 220,
        display: 'flex',
        flexDirection: 'column',
        minWidth: 0,
        height: '100vh',
        overflow: 'hidden',
        transition: 'margin-left 0.22s ease',
      }}>
        {/* Top bar */}
        <TopBar
          t={t}
          lang={lang}
          onLangToggle={handleLangToggle}
          currentRole={currentRole}
          onRoleChange={handleRoleChange}
          currentUser={currentUser || MOCK_DATA.users[0]}
          onLogout={handleLogout}
        />

        {/* Screen content */}
        <main style={{
          flex: 1,
          overflowY: 'auto',
          background: 'oklch(97.5% 0.008 60)',
        }}>
          {renderScreen()}
        </main>
      </div>

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection label="Brand Colors" />
        <TweakColor
          label="Accent Color"
          value={tweaks.accentColor}
          options={['oklch(45% 0.10 45)', 'oklch(42% 0.12 200)', 'oklch(40% 0.10 330)', 'oklch(38% 0.08 140)']}
          onChange={v => setTweak('accentColor', v)}
        />
        <TweakColor
          label="Sidebar"
          value={tweaks.sidebarColor}
          options={['oklch(22% 0.03 55)', 'oklch(18% 0.02 220)', 'oklch(16% 0.02 0)', 'oklch(96% 0.008 60)']}
          onChange={v => setTweak('sidebarColor', v)}
        />
        <TweakSection label="Layout" />
        <TweakSlider label="Card Radius" value={tweaks.cardRadius} min={0} max={24} step={2} onChange={v => setTweak('cardRadius', v)} />
        <TweakSlider label="Font Scale" value={tweaks.fontScale} min={0.85} max={1.2} step={0.05} onChange={v => setTweak('fontScale', v)} />
        <TweakSection label="Interface" />
        <TweakToggle label="Show Product Images" value={tweaks.showProductImages} onChange={v => setTweak('showProductImages', v)} />
        <TweakRadio
          label="Default Language"
          value={tweaks.defaultLang}
          options={['en', 'pt']}
          onChange={v => setTweak('defaultLang', v)}
        />
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
